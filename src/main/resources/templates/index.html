<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Mockaroo Clone</title>

    <style>
        body {
            font-family: Arial;
            padding: 20px;
        }

        button {
            padding: 10px 20px;
            background: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
        }

        table {
            margin-top: 20px;
            border-collapse: collapse;
        }

        th, td {
            border: 1px solid #ddd;
            padding: 8px;
        }

        th {
            background: #f4f4f4;
        }
    </style>
</head>

<body>

<h2>Mockaroo Clone</h2>

<label>件数:</label>
<input type="number" id="count" value="100" min="1" max="1000">


<button onclick="loadData()">作成</button>

<table>
    <thead>
        <tr>
            <th>名字</th>
            <th>名前</th>
            <th>パスワード</th>
        </tr>
    </thead>

    <tbody></tbody>
</table>

<script>
function loadData() {

    const count = document.getElementById("count").value;

    fetch("/test?count=" + count)
        .then(res => res.json())
        .then(data => {
            const tbody = document.querySelector("tbody");
            tbody.innerHTML = "";

            data.forEach(user => {
                tbody.innerHTML += `
                    <tr>
                        <td>${user.lastName}</td>
                        <td>${user.firstName}</td>
                        <td>${user.password}</td>
                    </tr>
                `;
            });
        });
}
</script>

</body>
</html>
